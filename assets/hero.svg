<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc9933;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#cc9933;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#cc9933;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(555, 55)">
    <text x="0" y="20" fill="#8b949e" font-family="monospace" font-size="12">{</text>
    <text x="16" y="45" fill="#cc9933" font-family="monospace" font-size="11">"type": "agent_run",</text>
    <text x="16" y="68" fill="#cc9933" font-family="monospace" font-size="11">"version": "1.0.0",</text>
    <text x="16" y="91" fill="#3fb950" font-family="monospace" font-size="11">"status": "valid",</text>
    <text x="16" y="114" fill="#cc9933" font-family="monospace" font-size="11">"tags": ["llm", "prod"]</text>
    <text x="0" y="137" fill="#8b949e" font-family="monospace" font-size="12">}</text>
    <rect x="-5" y="-5" width="235" height="155" rx="8" fill="none" stroke="#cc9933" stroke-width="1" stroke-opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#cc9933" fill-opacity="0.12" stroke="#cc9933" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-serializer</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Production-grade serialization and deserialization for agent data</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#cc9933" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="122" y="220" width="120" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="182" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">JSON/Msgpack</text>
    <rect x="254" y="220" width="144" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="326" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Schema Registry</text>
    <rect x="410" y="220" width="160" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="490" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Version Migration</text>
    <rect x="582" y="220" width="96" height="26" rx="13" fill="#cc9933" fill-opacity="0.15" stroke="#cc9933" stroke-width="1"/>
    <text x="630" y="237" fill="#cc9933" font-family="monospace" font-size="11" text-anchor="middle">Type-Safe</text>
</svg>